<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
    DemoApp adaptive-icon foreground — v4 (rebrand 2026-05-10, "Obsidian")
    All artwork is kept inside the central ~66% safe area
    (Android adaptive icons crop the outer 17% on each side).
    Background colour is supplied by Resources/AppIcon/appicon.svg
    and the MauiIcon Color attribute (#0F172A — BrandPrimary).
-->
<svg width="456" height="456" viewBox="0 0 456 456" version="1.1"
     xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="ringFill" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#A5B4FC" />
            <stop offset="40%"  stop-color="#6366F1" />
            <stop offset="100%" stop-color="#4338CA" />
        </linearGradient>
        <linearGradient id="ringStroke" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#C7D2FE" />
            <stop offset="55%"  stop-color="#818CF8" />
            <stop offset="100%" stop-color="#3730A3" />
        </linearGradient>
        <linearGradient id="innerDisc" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#0F172A" />
            <stop offset="100%" stop-color="#020617" />
        </linearGradient>
    </defs>

    <g transform="translate(228 228)">
        <circle cx="0" cy="0" r="118" fill="url(#ringFill)" />
        <circle cx="0" cy="0" r="102" fill="url(#innerDisc)" />

        <ellipse cx="0" cy="-30" rx="72" ry="30" fill="#6366F1" opacity="0.16" />

        <path d="M -50,4 L -14,42 L 54,-32"
              fill="none"
              stroke="url(#ringStroke)"
              stroke-width="22"
              stroke-linecap="round"
              stroke-linejoin="round" />
    </g>
</svg>
