<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
    DemoApp brand mark — v4 (rebrand 2026-05-10, "Obsidian")
    Concept: a central HUB (indigo ring + inner disc) with a CHECK mark
    inside ("test"), surrounded by three orbiting nodes connected by
    faint spokes ("hub network"). Refined for the new Slate + Indigo
    palette: lighter ring weight, electric-indigo glow, deeper slate
    card. Tokens: BrandPrimary #0F172A, BrandAccent #6366F1.
-->
<svg width="512" height="512" viewBox="0 0 512 512" version="1.1"
     xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Card background: deep slate with a top-down lift -->
        <linearGradient id="cardBg" x1="50%" y1="0%" x2="50%" y2="100%">
            <stop offset="0%"   stop-color="#1E293B" />
            <stop offset="55%"  stop-color="#0F172A" />
            <stop offset="100%" stop-color="#020617" />
        </linearGradient>

        <!-- Soft electric-indigo halo behind the hub -->
        <radialGradient id="cardGlow" cx="50%" cy="42%" r="60%">
            <stop offset="0%"   stop-color="#6366F1" stop-opacity="0.42" />
            <stop offset="55%"  stop-color="#6366F1" stop-opacity="0.10" />
            <stop offset="100%" stop-color="#6366F1" stop-opacity="0" />
        </radialGradient>

        <!-- Electric indigo for the hub ring (matches BrandAccent + Light) -->
        <linearGradient id="ringFill" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#A5B4FC" />
            <stop offset="40%"  stop-color="#6366F1" />
            <stop offset="100%" stop-color="#4338CA" />
        </linearGradient>
        <linearGradient id="ringStroke" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#C7D2FE" />
            <stop offset="55%"  stop-color="#818CF8" />
            <stop offset="100%" stop-color="#3730A3" />
        </linearGradient>

        <!-- Inner disc inside the hub ring (deepest slate-black) -->
        <linearGradient id="innerDisc" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#0F172A" />
            <stop offset="100%" stop-color="#020617" />
        </linearGradient>
    </defs>

    <!-- Rounded card -->
    <rect x="32" y="32" width="448" height="448" rx="100" ry="100" fill="url(#cardBg)" />
    <rect x="32" y="32" width="448" height="448" rx="100" ry="100" fill="url(#cardGlow)" />

    <!-- Hairline inner border for a premium frame -->
    <rect x="42" y="42" width="428" height="428" rx="92" ry="92"
          fill="none" stroke="#334155" stroke-width="2" opacity="0.85" />

    <!-- Hub graphic, centered at (256, 256) -->
    <g transform="translate(256 256)">

        <!-- Faint spokes from hub edge to outer nodes -->
        <g stroke="url(#ringStroke)" stroke-width="5" stroke-linecap="round" opacity="0.45">
            <line x1="0"    y1="-110" x2="0"    y2="-168" />
            <line x1="95"   y1="55"   x2="146"  y2="84"  />
            <line x1="-95"  y1="55"   x2="-146" y2="84"  />
        </g>

        <!-- Outer "connected" nodes — three points at 120° -->
        <g fill="url(#ringFill)">
            <circle cx="0"    cy="-178" r="14" />
            <circle cx="154"  cy="89"   r="14" />
            <circle cx="-154" cy="89"   r="14" />
        </g>

        <!-- Hub ring (thinner, more refined than v3) -->
        <circle cx="0" cy="0" r="120" fill="url(#ringFill)" />
        <circle cx="0" cy="0" r="104" fill="url(#innerDisc)" />

        <!-- Subtle inner highlight on the disc -->
        <ellipse cx="0" cy="-32" rx="74" ry="32" fill="#6366F1" opacity="0.16" />

        <!-- Checkmark inside the hub ("test" pass) -->
        <path d="M -52,4 L -14,44 L 56,-34"
              fill="none"
              stroke="url(#ringStroke)"
              stroke-width="22"
              stroke-linecap="round"
              stroke-linejoin="round" />
    </g>
</svg>
